<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Scanner Accessi</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        .scanner-container {
            max-width: 600px;
            width: 100%;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #reader {
            width: 100%;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        #reader button {
            background-color: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            margin-top: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        #reader button:hover {
            background-color: rgba(255,255,255,0.1);
        }
        #reader a {
            color: rgba(255,255,255,0.6);
            font-family: 'Space Mono', monospace;
        }
        .status-box {
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            display: none;
        }
        .status-box h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
        }
        .status-success {
            border-color: rgba(50, 255, 50, 0.4);
            background: rgba(50, 255, 50, 0.05);
        }
        .status-success h3 {
            color: rgba(100, 255, 100, 0.9);
        }
        .status-error {
            border-color: rgba(255, 50, 50, 0.4);
            background: rgba(255, 50, 50, 0.05);
        }
        .status-error h3 {
            color: rgba(255, 100, 100, 0.9);
        }
        .user-details {
            font-size: 1rem;
            color: #fff;
            font-family: 'Space Mono', monospace;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050508">
</head>
<body class="landing-page">

    <!-- Animated fluid background -->
    <div class="fluid-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="grain-overlay"></div>

    <!-- MAIN NAVIGATION -->
    <nav class="main-nav">
        <div class="nav-left">
            <a href="/">
                <img src="logo.png" alt="DLBP Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="/">HOME</a>
            <a href="eventi">EVENTI</a>
            <div class="dropdown-wrapper">
                <button id="staff-btn" class="active">AREA RISERVATA</button>
                <div class="dropdown-content" id="staff-dropdown">
                    <a href="admin">ADMIN</a>
                    <a href="scanner" class="active">SCANNER</a>
                    <a href="pr">AREA PR</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main id="app-main" class="eventi-page">

        <!-- Login Section -->
        <section id="login-section" class="event-card-item fade-in stagger-1" style="max-width: 400px; margin: 0 auto; text-align: center; opacity: 1; transform: none;">
            <h2 class="event-card-title" style="font-size: 1.2rem; margin-bottom: 2rem;">ACCESSO SCANNER</h2>
            <div class="form-group" style="margin-bottom: 2rem;">
                <input type="password" id="scanner-password" placeholder="PASSWORD" required style="text-align: center; letter-spacing: 2px;">
            </div>
            <button id="login-btn" class="submit-btn" style="width: 100%;">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Scanner Section -->
        <section id="scanner-section" class="fade-in stagger-1" style="display: none; width: 100%; max-width: 600px; margin: 0 auto;">
            <div class="event-card-item" style="opacity: 1; transform: none; padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                    <h2 class="event-card-title" style="font-size: 1.2rem; margin: 0;">SCANNER QR</h2>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div id="live-counter" style="font-size: 1rem; font-weight: bold; color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1rem; background: rgba(255,255,255,0.05); border-radius: 4px; font-family: 'Space Mono', monospace;">INGRESSI: -- / --</div>
                    </div>
                </div>
                
                <div id="reader"></div>

                <div id="status-box" class="status-box">
                    <h3 id="status-title">STATUS</h3>
                    <div id="status-details" class="user-details"></div>
                    <button id="next-scan-btn" class="submit-btn" style="margin-top: 1.5rem; width: 100%;">PROSSIMO BIGLIETTO</button>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="copyright-bottom-left">© 2026 DLBP — All rights reserved</div>
    </footer>

    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        // Staff Dropdown Toggle Logic
        const staffBtn = document.getElementById('staff-btn');
        const staffDropdown = document.getElementById('staff-dropdown');

        if (staffBtn && staffDropdown) {
            staffBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                staffDropdown.classList.toggle('show');
            });

            document.addEventListener('click', () => {
                staffDropdown.classList.remove('show');
            });
        }
    </script>
    <script type="module" src="scanner.js"></script>
</body>
</html>
