<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Drink Love Breathe Peace</title>
    <meta name="description" content="DLBP — An exclusive artistic movement. Private events, curated experiences, underground culture.">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050508">
</head>
<body class="landing-page no-scroll">
    <div id="initial-loader">
        <img src="logo.png" alt="Loading..." class="loader-logo">
    </div>

    <!-- MAIN NAVIGATION -->
    <nav class="main-nav">
        <div class="nav-left">
            <a href="index.html">
                <img src="logo.png" alt="DLBP Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="index.html" class="active">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <button id="staff-btn">AREA RISERVATA</button>
        </div>
    </nav>

    <!-- STAFF MENU OVERLAY -->
    <div class="menu-overlay" id="staff-overlay">
        <a href="admin.html">ADMIN</a>
        <a href="scanner.html">SCANNER</a>
        <a href="pr.html">AREA PR</a>
    </div>

    <!-- HERO SECTION (100vh) -->
    <section class="hero-fullscreen" id="hero">
        <div class="hero-bg-fallback"></div>
        <div class="grain-overlay" style="z-index: 1;"></div>
        <div class="hero-tagline-center reveal">DRINK · LOVE · BREATHE · PEACE</div>
        <div class="social-bottom reveal">
            <div class="social-icons">
                <a href="https://instagram.com/dlbp.art" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <span aria-label="Facebook"><i class="fab fa-facebook-f"></i></span>
                <span aria-label="TikTok"><i class="fab fa-tiktok"></i></span>
                <span aria-label="Telegram"><i class="fab fa-telegram-plane"></i></span>
                <span aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></span>
                <span aria-label="YouTube"><i class="fab fa-youtube"></i></span>
                <span aria-label="SoundCloud"><i class="fab fa-soundcloud"></i></span>
            </div>
        </div>
        <div class="copyright-bottom-left reveal">© 2026 DLBP — All rights reserved</div>
    </section>

    <!-- JS -->
    <script>
        // Staff Menu Toggle Logic
        const staffBtn = document.getElementById('staff-btn');
        const staffOverlay = document.getElementById('staff-overlay');

        if (staffBtn && staffOverlay) {
            staffBtn.addEventListener('click', () => {
                staffOverlay.classList.toggle('active');
                staffBtn.textContent = staffOverlay.classList.contains('active') ? 'CHIUDI' : 'AREA RISERVATA';
            });
        }
    </script>
    <script type="module" src="home.js"></script>
</body>
</html>
