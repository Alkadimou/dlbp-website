<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Drink Love Breathe Peace</title>
    <meta name="description" content="DLBP — An exclusive artistic movement. Private events, curated experiences, underground culture.">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050508">
</head>
<body class="landing-page no-scroll">
    <div id="initial-loader">
        <img src="logo.png" alt="Loading..." class="loader-logo">
    </div>

    <!-- Animated fluid background -->
    <div class="fluid-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Subtle grain texture overlay -->
    <div class="grain-overlay"></div>

    <!-- SINGLE SCREEN HERO -->
    <section class="hero-section" id="hero">
        <div class="hero-content reveal">
            <img src="logo.png" alt="DLBP Logo" class="logo-img">
            <div class="hero-divider"></div>
            <p class="hero-tagline">DRINK · LOVE · BREATHE · PEACE</p>
        </div>

        <!-- Bottom bar: EVENTI link + footer info -->
        <div class="hero-bottom reveal stagger-2">
            <a href="eventi.html" class="enter-btn">EVENTI</a>
            <div class="hero-footer-row">
                <a href="https://instagram.com/dlbp.art" target="_blank" rel="noopener" class="hero-social">Instagram</a>
            </div>
        </div>

        <!-- Staff access (hidden) -->
        <div class="staff-links">
            <a href="admin.html">Admin</a>
            <a href="scanner.html">Scanner</a>
            <a href="pr.html">Area PR</a>
        </div>
    </section>

    <script type="module" src="home.js"></script>
</body>
</html>
