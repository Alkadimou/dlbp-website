<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Area PR</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        .pr-container {
            max-width: 800px;
            width: 100%;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dashboard-section {
            display: none;
        }
        .dashboard-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .kpi-box {
            background: rgba(255,255,255,0.02);
            padding: 1.5rem 1rem; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .kpi-box.highlight {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .kpi-box h4 {
            color: rgba(255,255,255,0.5); 
            font-size: 0.6rem; 
            letter-spacing: 2px; 
            margin-bottom: 0.5rem;
            font-family: 'Space Mono', monospace;
        }
        .kpi-box.highlight h4 {
            color: rgba(255,255,255,0.8);
        }
        .kpi-value {
            font-size: 2rem; 
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050508">
</head>
<body class="landing-page">

    <!-- Animated fluid background -->
    <div class="fluid-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="grain-overlay"></div>

    <!-- MAIN NAVIGATION -->
    <nav class="main-nav">
        <div class="nav-left">
            <a href="index.html">
                <img src="logo.png" alt="DLBP Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <button id="staff-btn" class="active">AREA RISERVATA</button>
        </div>
    </nav>

    <!-- STAFF MENU OVERLAY -->
    <div class="menu-overlay" id="staff-overlay">
        <button class="close-overlay-btn" id="close-staff-btn" aria-label="Chiudi menu">&times;</button>
        <a href="admin.html">ADMIN</a>
        <a href="scanner.html">SCANNER</a>
        <a href="pr.html" class="active">AREA PR</a>
    </div>
    
    <main id="app-main" class="eventi-page pr-container">
        <!-- Login Section -->
        <section id="login-section" class="event-card-item fade-in stagger-1" style="max-width: 400px; margin: 0 auto; text-align: center; opacity: 1; transform: none;">
            <h2 class="event-card-title" style="font-size: 1.2rem; margin-bottom: 2rem;">ACCESSO PR</h2>
            <div class="form-group" style="margin-bottom: 2rem;">
                <input type="password" id="pr-code" placeholder="CODICE PR" style="text-align: center; letter-spacing: 2px;">
            </div>
            <button id="login-btn" class="submit-btn" style="width: 100%;">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="fade-in stagger-1" style="display: none; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                <h2 id="pr-welcome" class="event-card-title" style="margin: 0; font-size: 1.2rem;">DASHBOARD PR</h2>
                <button id="logout-btn" class="submit-btn" style="margin: 0; padding: 0.5rem 1rem; border-color: rgba(255, 50, 50, 0.4); color: rgba(255, 100, 100, 0.8); font-size: 0.7rem;">ESCI</button>
            </div>
            <div class="dashboard-grid">
                <div class="kpi-box">
                    <h4>ISCRITTI TOTALI</h4>
                    <div class="kpi-value" id="stat-total">0</div>
                </div>
                <div class="kpi-box">
                    <h4>APPROVATI</h4>
                    <div class="kpi-value" id="stat-approved">0</div>
                </div>
                <div class="kpi-box highlight">
                    <h4>INGRESSI (ENTRATI)</h4>
                    <div class="kpi-value" id="stat-entered">0</div>
                </div>
            </div>

            <div class="event-card-item" style="opacity: 1; transform: none; padding: 2rem; text-align: center;">
                <h3 style="font-size: 0.8rem; margin-bottom: 1.5rem; letter-spacing: 1px; color: rgba(255,255,255,0.7); font-family: 'Space Mono', monospace;">IL TUO LINK DI INVITO</h3>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <input type="text" id="invite-link" readonly style="flex-grow: 1; text-align: center;">
                    <button id="copy-btn" class="submit-btn" style="margin: 0; padding: 0 2rem; flex-shrink: 0;">COPIA</button>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="copyright-bottom-left">© 2026 DLBP — All rights reserved</div>
    </footer>

    <!-- JS -->
    <script>
        // Staff Menu Toggle Logic
        const staffBtn = document.getElementById('staff-btn');
        const staffOverlay = document.getElementById('staff-overlay');
        const closeStaffBtn = document.getElementById('close-staff-btn');

        if (staffBtn && staffOverlay) {
            staffBtn.addEventListener('click', () => {
                staffOverlay.classList.add('active');
            });
        }

        if (closeStaffBtn && staffOverlay) {
            closeStaffBtn.addEventListener('click', () => {
                staffOverlay.classList.remove('active');
            });
        }
    </script>
    <script type="module" src="pr.js"></script>
</body>
</html>
