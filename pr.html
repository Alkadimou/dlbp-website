<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Area PR</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .pr-container {
            max-width: 800px;
            width: 100%;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dashboard-section {
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            text-align: center;
        }
        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-color);
        }
        .stat-box h3 {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <main id="app-main" class="container pr-container">
        <header class="header">
            <img src="logo.jpg" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">PR DASHBOARD</p>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="event-card">
            <h2 class="event-title" style="font-size: 1.5rem;">ACCESSO PR</h2>
            <div class="form-group">
                <input type="text" id="pr-code" placeholder="INSERISCI CODICE PR">
            </div>
            <button id="login-btn" class="submit-btn">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 id="pr-welcome" class="event-title" style="margin: 0; font-size: 1.5rem;">DASHBOARD PR</h2>
                <button id="logout-btn" style="background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 0.5rem 1rem; cursor: pointer; font-family: inherit;">ESCI</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <h3>ISCRITTI TOTALI</h3>
                    <div class="stat-number" id="stat-total">0</div>
                </div>
                <div class="stat-box">
                    <h3>APPROVATI</h3>
                    <div class="stat-number" id="stat-approved">0</div>
                </div>
                <div class="stat-box">
                    <h3>INGRESSI (ENTRATI)</h3>
                    <div class="stat-number" id="stat-entered" style="color: #4CAF50;">0</div>
                </div>
            </div>

            <div class="event-card">
                <h3 style="font-size: 1rem; margin-bottom: 1rem; text-align: center;">IL TUO LINK DI INVITO</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="invite-link" readonly style="flex-grow: 1; padding: 0.8rem; background: #111; border: 1px solid #333; color: #fff; font-family: 'Space Grotesk'; font-size: 0.9rem;">
                    <button id="copy-btn" class="submit-btn" style="margin: 0; padding: 0 1.5rem;">COPIA</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="pr.js"></script>
</body>
</html>
