<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Area PR</title>
    <link rel="icon" href="logo.png" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .pr-container {
            max-width: 800px;
            width: 100%;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dashboard-section {
            display: none;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <nav class="global-nav">
        <a href="index.html">HOME</a>
        <a href="admin.html">ADMIN</a>
        <a href="scanner.html">SCANNER</a>
        <a href="pr.html" class="active">AREA PR</a>
    </nav>
    <div class="noise-overlay"></div>
    
    <main id="app-main" class="container pr-container">
        <header class="header">
            <img src="logo.png" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">PR DASHBOARD</p>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="event-card fade-in stagger-1" style="text-align: center;">
            <h2 class="event-title" style="font-size: 1.5rem; margin-bottom: 2rem;">ACCESSO PR</h2>
            <div class="form-group" style="margin-bottom: 2rem;">
                <input type="text" id="pr-code" placeholder="INSERISCI CODICE PR" style="text-align: center; letter-spacing: 2px;">
            </div>
            <button id="login-btn" class="submit-btn" style="font-weight: 900; letter-spacing: 4px; width: 100%; box-sizing: border-box;">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="fade-in stagger-1">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 id="pr-welcome" class="event-title" style="margin: 0; font-size: 1.5rem;">DASHBOARD PR</h2>
                <button id="logout-btn" style="background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 0.5rem 1rem; cursor: pointer; font-family: inherit; border-radius: 4px;">ESCI</button>
            </div>

            <div class="dashboard-grid" style="margin-bottom: 2rem;">
                <div class="kpi-box">
                    <h4>ISCRITTI TOTALI</h4>
                    <div class="kpi-value" id="stat-total">0</div>
                </div>
                <div class="kpi-box">
                    <h4>APPROVATI</h4>
                    <div class="kpi-value" id="stat-approved">0</div>
                </div>
                <div class="kpi-box highlight">
                    <h4 style="color: var(--accent-color);">INGRESSI (ENTRATI)</h4>
                    <div class="kpi-value" id="stat-entered" style="color: var(--accent-color);">0</div>
                </div>
            </div>

            <div class="event-card">
                <h3 style="font-size: 1rem; margin-bottom: 1rem; text-align: center;">IL TUO LINK DI INVITO</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="invite-link" readonly style="flex-grow: 1; padding: 0.8rem; background: #111; border: 1px solid #333; color: #fff; font-family: 'Space Grotesk'; font-size: 0.9rem;">
                    <button id="copy-btn" class="submit-btn" style="margin: 0; padding: 0 1.5rem;">COPIA</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="pr.js"></script>
</body>
</html>
