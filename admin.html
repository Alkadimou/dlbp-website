<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Admin Panel</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1200px;
            width: 100%;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .users-table th, .users-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .stat-box h3 {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 2rem;
            border-radius: 4px;
        }
        .users-table th {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            opacity: 0.8;
        }
        .admin-actions {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .admin-actions > * {
            box-sizing: border-box;
            max-width: 100%;
        }
        .danger-btn {
            background: var(--error-color);
            color: white;
        }
        .danger-btn:hover {
            background: #cc0000;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dashboard-section {
            display: none;
        }
        .settings-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .settings-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .settings-item label {
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #888;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--success-color);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .capacity-input {
            width: 80px;
            padding: 0.5rem;
            text-align: center;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
        }
        .present-counter {
            font-size: 2rem;
            font-weight: bold;
            color: var(--success-color);
            margin-left: auto;
        }

        /* Responsive Improvements */
        * {
            box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            .event-card {
                padding: 1.5rem 1rem; /* Meno padding sui lati per mobile */
            }
            .admin-actions > * {
                flex: 1 1 100%; /* Su mobile ogni pulsante occupa tutta la larghezza */
                text-align: center;
                justify-content: center;
            }
            #admin-event-selector {
                width: 100%;
                min-width: unset !important; /* Forza la riduzione su schermi piccoli */
            }
            #new-event-btn {
                width: 100%;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <main id="app-main" class="container">
        <header class="header">
            <img src="logo.jpg" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">SECURITY CLEARANCE REQUIRED</p>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="event-card">
            <h2 class="event-title" style="font-size: 1.5rem;">ACCESSO ADMIN</h2>
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="INSERISCI PASSWORD">
            </div>
            <button id="login-btn" class="submit-btn">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="event-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">GESTIONE EVENTO</h2>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <select id="admin-event-selector" style="padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk'; min-width: 200px;">
                    </select>
                    <button id="set-active-btn" class="submit-btn" style="margin: 0; padding: 0.5rem 1rem; background: var(--success-color); border: none; color: white;">IMPOSTA ATTIVO</button>
                    <button id="new-event-btn" class="submit-btn" style="margin: 0; padding: 0.5rem 1rem; background: var(--text-color); color: var(--bg-color);">NUOVO ACT</button>
                </div>
            </div>

            <div class="settings-panel">
                <div class="settings-item">
                    <label>LISTE APERTE</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="list-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-item">
                    <label>CAPIENZA LOCALE</label>
                    <input type="number" id="capacity-input" class="capacity-input" value="100">
                    <button id="save-capacity-btn" style="background:transparent; color:var(--accent-color); border:1px solid var(--border-color); padding: 0.5rem; cursor: pointer;">SALVA</button>
                </div>
                <div class="settings-item" style="flex-grow: 1; min-width: 250px;">
                    <label>LINK FLYER</label>
                    <input type="text" id="flyer-input" placeholder="https://imgur.com/..." style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                </div>
                <div class="settings-item" style="flex-grow: 1; min-width: 100%;">
                    <label>DESCRIZIONE</label>
                    <textarea id="desc-input" placeholder="Descrizione dell'evento..." style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk'; min-height: 60px; resize: vertical;"></textarea>
                    <button id="save-content-btn" class="submit-btn" style="margin-top: 0.5rem; padding: 0.5rem 1rem;">SALVA TESTI & IMMAGINE</button>
                </div>
                <div class="settings-item present-counter">
                    <span id="present-count">0</span><span style="font-size: 1rem; color: #888;"> / <span id="capacity-display">100</span></span>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">ISCRITTI (TXK.NØX)</h2>
                <input type="text" id="search-input" placeholder="Cerca nome o email..." style="padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; flex-grow: 1; max-width: 300px;">
            </div>

            <div class="admin-actions" style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="analytics.html" class="submit-btn" style="margin: 0; padding: 0.8rem 1.2rem; text-decoration: none; display: flex; align-items: center; background: #3498db; color: white;">
                    <span class="btn-text">ANALYTICS</span>
                </a>
                <button id="delete-selected-btn" class="submit-btn danger-btn" style="margin: 0; padding: 0.8rem 1.2rem; opacity: 0.5;" disabled>
                    ELIMINA SELEZIONATI
                </button>
                <button id="export-csv-btn" class="submit-btn" style="margin: 0; padding: 0.8rem 1.2rem; background: #333; color: white;">
                    ESPORTA EXCEL
                </button>
                <button id="send-emails-btn" class="submit-btn" style="margin: 0; padding: 0.8rem 1.2rem; background: var(--text-color); color: var(--bg-color);">
                    INVIA SECRET LOCATION
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="users-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">
                            <input type="checkbox" id="select-all-cb">
                        </th>
                        <th>NOME</th>
                        <th>EMAIL</th>
                        <th>STATO</th>
                        <th>DATA</th>
                        <th>CHECK-IN</th>
                        <th style="text-align: right;">AZIONI</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Data populated by JS -->
                </tbody>
                </table>
            </div>
            <div id="admin-message" class="form-message hidden"></div>
        </section>
    </main>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
