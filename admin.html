<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Admin Panel</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 1200px;
            width: 100%;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .users-table th, .users-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .stat-box h3 {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 2rem;
            border-radius: 4px;
        }
        .users-table th {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            opacity: 0.8;
        }
        .pr-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .pr-table th, .pr-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .pr-table th {
            color: var(--accent-color);
            border-bottom: 2px solid #333;
        }
        .admin-actions {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .admin-actions > * {
            box-sizing: border-box;
            max-width: 100%;
        }
        .danger-btn {
            background: var(--error-color);
            color: white;
        }
        .danger-btn:hover {
            background: #cc0000;
        }
        #login-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        #dashboard-section {
            display: none;
        }
        .settings-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .settings-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .settings-item label {
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #888;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #fff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: #000;
        }
        .capacity-input {
            width: 80px;
            padding: 0.5rem;
            text-align: center;
            background: #111;
            border: 1px solid var(--border-color);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
        }
        .present-counter {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-left: auto;
        }

        /* Responsive Improvements */
        * {
            box-sizing: border-box;
        }
        
        @media (max-width: 768px) {
            .event-card {
                padding: 1.5rem 1rem; /* Meno padding sui lati per mobile */
            }
            .admin-actions > * {
                flex: 1 1 100%; /* Su mobile ogni pulsante occupa tutta la larghezza */
                text-align: center;
                justify-content: center;
            }
            #admin-event-selector {
                width: 100%;
                min-width: unset !important; /* Forza la riduzione su schermi piccoli */
            }
            #new-event-btn {
                width: 100%;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .toolbar-panel {
                grid-template-columns: 1fr;
            }
        }

        .toolbar-panel {
            display: grid;
            grid-template-columns: 1fr 2fr;
            align-items: end;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
        }
        .toolbar-panel .toolbar-input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .toolbar-panel .toolbar-input-group label {
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .toolbar-panel .toolbar-input-group select,
        .toolbar-panel .toolbar-input-group input {
            width: 100%;
            height: 42px;
            padding: 0.5rem 1rem;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            font-family: 'Space Grotesk';
        }
        .toolbar-panel .toolbar-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
            width: 100%;
        }
        .toolbar-panel .toolbar-actions button {
            margin: 0;
            height: 42px;
            padding: 0 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 1.5rem; left: 2rem; z-index: 1000; display: flex; gap: 1rem; font-family: 'Space Grotesk', sans-serif; font-weight: 700; flex-wrap: wrap;">
        <a href="index.html" style="color: #555; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">HOME</a>
        <a href="admin.html" style="color: #555; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">ADMIN</a>
        <a href="scanner.html" style="color: #555; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">SCANNER</a>
        <a href="pr.html" style="color: #555; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: color 0.3s ease;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#555'">AREA PR</a>
    </div>
    <div class="noise-overlay"></div>
    
    <main id="app-main" class="container">
        <header class="header">
            <img src="logo.jpg" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">SECURITY CLEARANCE REQUIRED</p>
        </header>

        <!-- Login Section -->
        <section id="login-section" class="event-card">
            <h2 class="event-title" style="font-size: 1.5rem;">ACCESSO ADMIN</h2>
            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="email" id="admin-email" placeholder="EMAIL AMMINISTRATORE" required>
            </div>
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="INSERISCI PASSWORD" required>
            </div>
            <button id="login-btn" class="submit-btn">ACCEDI</button>
            <div id="login-message" class="form-message hidden"></div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="event-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">GESTIONE EVENTO</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="logout-btn" class="submit-btn outline-btn" style="margin: 0; padding: 0.5rem 1rem; border-color: #ff3333; color: #ff3333;">ESCI</button>
                    <button id="new-event-btn" class="submit-btn" style="margin: 0; padding: 0.5rem 1.5rem;">+ NUOVO ACT</button>
                </div>
            </div>

            <div class="toolbar-panel">
                <div class="toolbar-input-group">
                    <label>SELEZIONA EVENTO</label>
                    <select id="admin-event-selector"></select>
                </div>
                <div class="toolbar-actions">
                    <button id="set-active-btn" class="submit-btn">IMPOSTA ATTIVO</button>
                    <button id="edit-event-btn" class="submit-btn outline-btn">MODIFICA DETTAGLI</button>
                    <button id="manage-pr-btn" class="submit-btn outline-btn">GESTIONE PR</button>
                </div>
            </div>

            <div class="settings-panel" id="settings-panel" style="flex-direction: column; display: none; position: relative; border: 1px solid #333;">
                <button id="close-settings-btn" style="position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0.5rem;">✕</button>
                <h4 id="settings-panel-title" style="width: 100%; margin-top: 0; margin-bottom: 1rem; color: var(--accent-color); font-size: 0.9rem; letter-spacing: 2px;">MODIFICA EVENTO ESISTENTE</h4>
                
                <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%;">
                    <div class="settings-item" style="width: 100%;">
                        <label>NOME EVENTO</label>
                        <input type="text" id="event-name-input" placeholder="es: TXK.NØX Act II" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                    </div>
                    <div class="settings-item" style="width: 100%;">
                        <label>SECRET LOCATION (Email)</label>
                        <input type="text" id="event-location-input" placeholder="es: Via Fabio Filzi 28 Arezzo (AR)" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                    </div>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; width: 100%;">
                        <div class="settings-item" style="flex-grow: 2; min-width: 150px;">
                            <label>DATA EVENTO</label>
                            <input type="date" id="event-date-input" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                        </div>
                        <div class="settings-item" style="flex-grow: 1; min-width: 100px;">
                            <label>ORA INIZIO</label>
                            <input type="time" id="event-start-time-input" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                        </div>
                        <div class="settings-item" style="flex-grow: 1; min-width: 100px;">
                            <label>ORA FINE</label>
                            <input type="time" id="event-end-time-input" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; width: 100%;">
                    <div class="settings-item">
                        <label>LISTE APERTE</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="list-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-item">
                    <label>CAPIENZA LOCALE</label>
                    <input type="number" id="capacity-input" class="capacity-input" value="100">
                </div>
                </div>
                <div class="settings-item" style="flex-grow: 1; min-width: 250px;">
                    <label>CARICA FLYER</label>
                    <input type="file" id="flyer-input" accept="image/*" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk';">
                    <div id="current-flyer-preview" style="margin-top: 10px; font-size: 0.8rem; color: #888;">Nessun flyer caricato.</div>
                </div>
                <div style="margin-top: 1.5rem; width: 100%;">
                    <label>DESCRIZIONE EVENTO</label>
                    <textarea id="desc-input" rows="4" style="width: 100%; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk'; resize: vertical;"></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem; width: 100%;">
                    <button id="delete-event-btn" class="submit-btn outline-btn" style="flex: 1; border-color: #ff3333; color: #ff3333;">ELIMINA EVENTO</button>
                    <button id="save-content-btn" class="submit-btn" style="flex: 2;">SALVA DETTAGLI EVENTO</button>
                </div>
                <div class="settings-item present-counter">
                    <span id="present-count">0</span><span style="font-size: 1rem; color: #888;"> / <span id="capacity-display">100</span></span>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">ISCRITTI EVENTO</h2>
            </div>

            <div class="toolbar-panel" style="grid-template-columns: 1fr 3fr;">
                <div class="toolbar-input-group">
                    <label>RICERCA ISCRITTI</label>
                    <input type="text" id="search-input" placeholder="Cerca nome o email...">
                </div>
                
                <div class="toolbar-actions">
                    <button class="submit-btn outline-btn" onclick="window.location.href='analytics.html'">ANALYTICS</button>
                    <button id="export-csv-btn" class="submit-btn outline-btn">ESPORTA EXCEL</button>
                    <button id="delete-selected-btn" class="submit-btn outline-btn" style="border-color: #ff3333; color: #ff3333; opacity: 0.5;" disabled>ELIMINA SELEZIONATI</button>
                    <button id="send-emails-btn" class="submit-btn">INVIA SECRET LOCATION</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="users-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">
                            <input type="checkbox" id="select-all-cb">
                        </th>
                        <th>NOME</th>
                        <th>EMAIL</th>
                        <th>REFERENTE (PR)</th>
                        <th>STATO</th>
                        <th>DATA</th>
                        <th>CHECK-IN</th>
                        <th style="text-align: right;">AZIONI</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Data populated by JS -->
                </tbody>
                </table>
            </div>
            <div id="admin-message" class="form-message hidden"></div>
        </section>
    </main>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!-- PR Management Modal -->
    <div id="pr-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; font-family: 'Space Grotesk', sans-serif;">
        <div class="event-card" style="width: 90%; max-width: 600px; padding: 2rem; position: relative; max-height: 90vh; overflow-y: auto;">
            <button id="close-pr-modal-btn" style="position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <h2 class="event-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">GESTIONE PR</h2>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <input type="text" id="pr-name-input" placeholder="Nome PR (es. Marco Rossi)" style="flex: 1; min-width: 200px; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333;">
                <input type="text" id="pr-code-input" placeholder="Codice Accesso (es. marco24)" style="flex: 1; min-width: 200px; padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333;">
                <button id="add-pr-btn" class="submit-btn" style="padding: 0.5rem 1rem; margin: 0;">AGGIUNGI</button>
            </div>

            <div style="overflow-x: auto;">
                <table class="pr-table">
                    <thead>
                        <tr>
                            <th>NOME</th>
                            <th>CODICE / LINK</th>
                            <th>STATO</th>
                            <th style="text-align: right;">AZIONI</th>
                        </tr>
                    </thead>
                    <tbody id="pr-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
