<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Eventi</title>
    <meta name="description" content="DLBP — Prossimi eventi e guestlist.">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050508">
</head>
<body class="landing-page">
    <div class="grain-overlay" style="z-index: 1;"></div>
    <!-- Animated fluid background -->
    <div class="fluid-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="grain-overlay"></div>

    <!-- MAIN NAVIGATION -->
    <nav class="main-nav">
        <div class="nav-left">
            <a href="index.html">
                <img src="logo.png" alt="DLBP Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-right">
            <a href="index.html">HOME</a>
            <a href="eventi.html" class="active">EVENTI</a>
            <button id="staff-btn">AREA RISERVATA</button>
        </div>
    </nav>

    <!-- EVENTS PAGE -->
    <main class="eventi-page">
        <span class="section-label reveal">PROSSIMI EVENTI</span>
        <div id="events-grid" class="events-grid">
            <div class="loading-events">
                <div class="loading-pulse"></div>
                <span>CARICAMENTO...</span>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="social-bottom">
            <div class="social-icons">
                <a href="https://instagram.com/dlbp.art" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <span aria-label="Facebook"><i class="fab fa-facebook-f"></i></span>
                <span aria-label="TikTok"><i class="fab fa-tiktok"></i></span>
                <span aria-label="Telegram"><i class="fab fa-telegram-plane"></i></span>
                <span aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></span>
                <span aria-label="YouTube"><i class="fab fa-youtube"></i></span>
                <span aria-label="SoundCloud"><i class="fab fa-soundcloud"></i></span>
            </div>
        </div>
        <div class="copyright-bottom-left">© 2026 DLBP — All rights reserved</div>
    </footer>

    <!-- STAFF MENU OVERLAY -->
    <div class="menu-overlay" id="staff-overlay">
        <button class="close-overlay-btn" id="close-staff-btn" aria-label="Chiudi menu">&times;</button>
        <a href="admin.html">ADMIN</a>
        <a href="scanner.html">SCANNER</a>
        <a href="pr.html">AREA PR</a>
    </div>

    <!-- JS -->
    <script>
        // Staff Menu Toggle Logic
        const staffBtn = document.getElementById('staff-btn');
        const staffOverlay = document.getElementById('staff-overlay');
        const closeStaffBtn = document.getElementById('close-staff-btn');

        if (staffBtn && staffOverlay) {
            staffBtn.addEventListener('click', () => {
                staffOverlay.classList.add('active');
            });
        }

        if (closeStaffBtn && staffOverlay) {
            closeStaffBtn.addEventListener('click', () => {
                staffOverlay.classList.remove('active');
            });
        }
    </script>
    <script type="module" src="home.js"></script>
</body>
</html>
