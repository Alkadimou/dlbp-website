<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Analytics</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            width: 100%;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .chart-card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
    <style>
        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: var(--accent-color);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 3px;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div id="loading-overlay">CARICAMENTO DATI...</div>
    <nav class="global-nav">
        <a href="index.html">HOME</a>
        <a href="admin.html">ADMIN</a>
        <a href="scanner.html">SCANNER</a>
        <a href="pr.html">AREA PR</a>
    </nav>
    <div class="noise-overlay"></div>
    
    <main class="container admin-container">
        <header class="header">
            <img src="logo.jpg" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">DATA ANALYTICS</p>
        </header>

        <section class="event-card fade-in stagger-1" id="analytics-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">PERFORMANCE EVENTO</h2>
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; flex: 1; justify-content: flex-end;">
                    <select id="event-selector" style="padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk'; flex: 1; min-width: 200px; border-radius: 4px;">
                        <!-- Eventi caricati dinamicamente -->
                    </select>
                    <a href="admin.html" class="submit-btn" style="text-decoration: none; display: inline-block; padding: 0.5rem 1rem; margin: 0; text-align: center; white-space: nowrap;">TORNA ALL'ADMIN</a>
                </div>
            </div>

            <!-- Numeri Chiave -->
            <div class="dashboard-grid" style="margin-bottom: 2rem;">
                <div class="kpi-box">
                    <h4>ISCRITTI TOTALI</h4>
                    <div class="kpi-value" id="stat-total">0</div>
                </div>
                <div class="kpi-box">
                    <h4>APPROVATI</h4>
                    <div class="kpi-value" id="stat-approved" style="color: var(--success-color);">0</div>
                </div>
                <div class="kpi-box">
                    <h4>IN ATTESA</h4>
                    <div class="kpi-value" id="stat-pending" style="color: #f1c40f;">0</div>
                </div>
                <div class="kpi-box highlight">
                    <h4 style="color: var(--accent-color);">PRESENTI ALLA PORTA</h4>
                    <div class="kpi-value" id="stat-present" style="color: var(--accent-color);">0</div>
                </div>
            </div>

            <!-- Grafici -->
            <div class="charts-grid">
                <!-- Grafico a Linee: Iscrizioni nel tempo -->
                <div class="chart-card" style="grid-column: 1 / -1;">
                    <h3>ANDAMENTO ISCRIZIONI</h3>
                    <canvas id="timelineChart" height="100"></canvas>
                </div>
                
                <!-- Grafico a Torta: Status -->
                <div class="chart-card">
                    <h3>FUNNEL DI APPROVAZIONE</h3>
                    <canvas id="statusChart"></canvas>
                </div>
                
                <!-- Grafico a Torta: No-show -->
                <div class="chart-card">
                    <h3>CONVERSIONE (NO-SHOW RATE)</h3>
                    <canvas id="conversionChart"></canvas>
                </div>

                <!-- Grafico a Barre: Picchi di Affluenza -->
                <div class="chart-card" style="grid-column: 1 / -1;">
                    <h3>PICCHI DI AFFLUENZA (CHECK-IN)</h3>
                    <canvas id="peakTrafficChart" height="100"></canvas>
                </div>
            </div>
            
        </section>
    </main>

    <script type="module" src="analytics.js"></script>
</body>
</html>
