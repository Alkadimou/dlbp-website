<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLBP | Analytics</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            width: 100%;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .chart-card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 1rem;
            text-align: center;
        }
        .stats-summary {
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box h4 {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .stat-box .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
        }
        .stat-box .stat-value.green { color: var(--success-color); }
        .stat-box .stat-value.yellow { color: #f1c40f; }
        
        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: var(--accent-color);
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">CARICAMENTO DATI...</div>
    <div class="noise-overlay"></div>
    
    <main class="container admin-container">
        <header class="header">
            <img src="logo.jpg" alt="DLBP Logo" class="logo-img">
            <p class="subtitle">DATA ANALYTICS</p>
        </header>

        <section class="event-card" id="analytics-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 class="event-title" style="font-size: 1.5rem; margin: 0;">PERFORMANCE EVENTO</h2>
                <select id="event-selector" style="padding: 0.5rem; background: #111; color: #fff; border: 1px solid #333; font-family: 'Space Grotesk'; min-width: 200px;">
                    <!-- Eventi caricati dinamicamente -->
                </select>
            </div>
            
            <div style="margin-bottom: 2rem; text-align: right;">
                <a href="admin.html" class="submit-btn" style="text-decoration: none; display: inline-block; padding: 0.5rem 1rem;">TORNA ALL'ADMIN</a>
            </div>

            <!-- Numeri Chiave -->
            <div class="stats-summary">
                <div class="stat-box">
                    <h4>ISCRITTI TOTALI</h4>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-box">
                    <h4>APPROVATI</h4>
                    <div class="stat-value green" id="stat-approved">0</div>
                </div>
                <div class="stat-box">
                    <h4>IN ATTESA</h4>
                    <div class="stat-value yellow" id="stat-pending">0</div>
                </div>
                <div class="stat-box">
                    <h4>PRESENTI ALLA PORTA</h4>
                    <div class="stat-value" id="stat-present">0</div>
                </div>
            </div>

            <!-- Grafici -->
            <div class="charts-grid">
                <!-- Grafico a Linee: Iscrizioni nel tempo -->
                <div class="chart-card" style="grid-column: 1 / -1;">
                    <h3>ANDAMENTO ISCRIZIONI</h3>
                    <canvas id="timelineChart" height="100"></canvas>
                </div>
                
                <!-- Grafico a Torta: Status -->
                <div class="chart-card">
                    <h3>FUNNEL DI APPROVAZIONE</h3>
                    <canvas id="statusChart"></canvas>
                </div>
                
                <!-- Grafico a Torta: No-show -->
                <div class="chart-card">
                    <h3>CONVERSIONE (NO-SHOW RATE)</h3>
                    <canvas id="conversionChart"></canvas>
                </div>

                <!-- Grafico a Barre: Picchi di Affluenza -->
                <div class="chart-card" style="grid-column: 1 / -1;">
                    <h3>PICCHI DI AFFLUENZA (CHECK-IN)</h3>
                    <canvas id="peakTrafficChart" height="100"></canvas>
                </div>
            </div>
            
        </section>
    </main>

    <script type="module" src="analytics.js"></script>
</body>
</html>
